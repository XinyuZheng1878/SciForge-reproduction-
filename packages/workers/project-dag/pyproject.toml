[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "sciforge-project-dag"
version = "0.1.0"
description = "Compiles per-thread evidence DAGs into one goal-oriented, bi-temporal project DAG"
requires-python = ">=3.10"
# evidence_dag is imported from the sibling package via a sys.path shim in
# project_dag/__init__.py (both ship side-by-side under packages/workers/), so
# it is NOT a PyPI dependency here — only its shared runtime dep is declared.
dependencies = ["networkx>=3.0"]

[project.scripts]
project-dag-server = "project_dag.server:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
