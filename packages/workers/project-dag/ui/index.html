<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>SciForge Project DAG</title>
<style>
  :root { --bg:#0f1115; --panel:#171a21; --line:#2a2f3a; --fg:#d7dae2; --dim:#8b93a5;
          --ok:#4caf7d; --warn:#e0b341; --bad:#e05d5d; --acc:#5b8dee; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg);
         font:13px/1.5 "Segoe UI",system-ui,sans-serif; display:flex; height:100vh; }
  nav { width:150px; background:var(--panel); border-right:1px solid var(--line);
        padding:12px 0; flex-shrink:0; }
  nav div { padding:8px 16px; cursor:pointer; color:var(--dim); }
  nav div.on { color:var(--fg); background:#1f2430; border-left:3px solid var(--acc); }
  main { flex:1; overflow:auto; padding:16px 20px; }
  h2 { font-size:15px; margin:0 0 12px; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:6px;
          padding:10px 12px; margin-bottom:8px; }
  .badge { display:inline-block; padding:0 6px; border-radius:8px; font-size:11px;
           margin-left:6px; background:#232838; color:var(--dim); }
  .s-supported{color:var(--ok)} .s-fragile{color:var(--warn)}
  .s-conflicted,.s-undetermined{color:var(--bad)} .s-invalidated{color:var(--dim);text-decoration:line-through}
  button { background:var(--acc); border:0; color:#fff; padding:6px 14px;
           border-radius:4px; cursor:pointer; margin-right:6px; }
  button.ghost { background:#232838; color:var(--fg); }
  input,select,textarea { background:#10131a; border:1px solid var(--line); color:var(--fg);
          padding:5px 8px; border-radius:4px; }
  .dim { color:var(--dim); } .mono { font-family:Consolas,monospace; font-size:12px; }
  pre { background:#10131a; padding:10px; border-radius:4px; overflow:auto; white-space:pre-wrap; }
  .goal-node { margin-left:14px; border-left:1px solid var(--line); padding-left:10px; }
  .row { display:flex; gap:8px; align-items:center; margin-bottom:8px; flex-wrap:wrap; }
</style>
</head>
<body>
<nav id="nav"></nav>
<main id="main"></main>
<script>
const TOKEN = (location.hash.match(/token=([^&]+)/)||[])[1] || "";
// deep-link params (set by the desktop app): ?view=report | ?autocompile=1
const PARAMS = new URLSearchParams(location.search);
const START_VIEW = PARAMS.get("view");
const AUTO_COMPILE = PARAMS.get("autocompile") === "1";
history.replaceState(null,"",location.pathname);
const api = (p, opt={}) => fetch(p, {...opt, headers:{
  "Content-Type":"application/json", "Authorization":"Bearer "+TOKEN,
  ...(opt.headers||{})}}).then(r=>r.json()).then(j=>{
    if(!j.ok) throw new Error(j.error ? j.error.message : "error"); return j.data;});
const el = (h) => { const d=document.createElement("div"); d.innerHTML=h; return d; };
const esc = s => String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

const VIEWS = {home:"项目主页", goals:"Goal 树", graph:"图谱", compile:"编译控制台",
               report:"周报", time:"时间机器"};
let cur = "home";
function renderNav(){
  document.getElementById("nav").innerHTML = Object.entries(VIEWS).map(
    ([k,v])=>`<div class="${k===cur?'on':''}" onclick="go('${k}')">${v}</div>`).join("");
}
function go(v){ cur=v; renderNav(); ROUTES[v](); }

const M = document.getElementById("main");

// ---------------- 项目主页 ----------------
async function home(){
  const [tree, review, runs] = await Promise.all(
    [api("/goals"), api("/review"), api("/compile-runs?limit=5")]);
  const claims = await api("/claims");
  const n = s => claims.filter(c=>c.status===s).length;
  M.innerHTML = `<h2>项目主页</h2>
    <div class="row">
      <div class="card">活跃 goal <b>${countGoals(tree)}</b></div>
      <div class="card s-supported">supported <b>${n("supported")}</b></div>
      <div class="card s-fragile">fragile <b>${n("fragile")}</b></div>
      <div class="card s-conflicted">冲突/未决 <b>${n("conflicted")+n("undetermined")}</b></div>
      <div class="card">待复核 <b>${review.length}</b></div>
    </div>
    <h2>最近编译</h2>` +
    runs.map(r=>`<div class="card mono">${esc(r.started_at)} · ${esc(r.trigger)} ·
      ${r.stats?`+${r.stats.claims_added} claim / merge ${r.stats.claims_merged} / 失效 ${r.stats.claims_invalidated}`:"…"}
      <span class="dim">${esc(r.id)}</span></div>`).join("") +
    `<h2>需要你注意</h2>` + (review.slice(0,5).map(reviewCard).join("") || `<div class="dim">无</div>`);
}
const countGoals = t => t.reduce((a,g)=>a+1+countGoals(g.children||[]),0);

// ---------------- Goal 树 ----------------
async function goals(){
  const tree = await api("/goals");
  M.innerHTML = `<h2>Goal 树</h2>
    <div class="row"><input id="ngoal" placeholder="新 goal 标题" size="40">
    <button onclick="addGoal()">新建 goal</button></div><div id="tree"></div><div id="claims"></div>`;
  document.getElementById("tree").append(...tree.map(goalNode));
}
function goalNode(g){
  const st = g.claim_stats||{};
  const d = el(`<div class="goal-node"><div class="card" style="cursor:pointer">
    <b>${esc(g.title)}</b> <span class="badge">${esc(g.status)}</span>
    <span class="badge s-supported">✓ ${st.supported||0}</span>
    <span class="badge s-fragile">△ ${st.fragile||0}</span>
    <span class="badge s-conflicted">⚠ ${(st.conflicted||0)+(st.undetermined||0)}</span>
    <span class="dim">v${g.version}</span></div></div>`);
  d.querySelector(".card").onclick = ()=>showClaims(g.root_id, g.title);
  (g.children||[]).forEach(c=>d.append(goalNode(c)));
  return d;
}
async function addGoal(){
  const t = document.getElementById("ngoal").value.trim();
  if(t){ await api("/goals",{method:"POST",body:JSON.stringify({title:t})}); goals(); }
}
async function showClaims(root, title){
  const cs = await api("/claims?goal="+encodeURIComponent(root));
  document.getElementById("claims").innerHTML = `<h2>${esc(title)} 的 claims</h2>` +
    (cs.map(c=>`<div class="card" style="cursor:pointer" onclick="claimDetail('${c.id}')">
      <span class="s-${c.status}">●</span> ${esc(c.statement)}
      <span class="badge">${esc(c.claim_type)}</span>
      <span class="badge">承重 ${c.load_bearing}</span>
      <span class="dim mono">${c.id}</span></div>`).join("") || `<div class="dim">无</div>`);
}
async function claimDetail(id){
  const c = await api("/claims/"+id);
  const sup = c.supports.map(s=>`<div class="card">
    ${s.evidence_type==="human_attested"?"👤":"📄"} ${esc(s.content||s.id)}
    <span class="badge">${s.edge_t_invalid?"已失效":"quality "+(s.quality_score??s.trust_score??"?")}</span>
    <span class="dim mono">${esc(s.source_hash||"")}</span></div>`).join("");
  M.innerHTML = `<h2>Claim 详情</h2><div class="card"><b>${esc(c.statement)}</b><br>
    <span class="s-${c.status}">${esc(c.status)}</span>
    <span class="badge">窗口 ${esc(c.t_valid)} ~ ${esc(c.t_invalid||"now")}</span></div>
    <h2>支持证据</h2>${sup||'<div class="dim">无</div>'}
    <h2>来源 session</h2>${c.origins.map(o=>`<div class="card mono">${esc(o.session_id)} # ${esc(o.node_id)}</div>`).join("")}
    <button class="ghost" onclick="go('goals')">← 返回</button>`;
}

// ---------------- 图谱（Project DAG 可视化） ----------------
// 树形层次：GOAL → ▸子课题组(session) → ▸claim（派生子结论缩进嵌套）→ 证据
// （缩进小卡，点击 claim 展开）。没有全局证据列 —— 证据共享度高时拉线只会
// 变成毛线团；共享证据在每条 claim 下就近显示并打 ×n 徽标（同源信号）。
// 全节点可拖拽（localStorage），/analysis 叠加承重 ⚡ 与脆弱/假鲁棒琥珀虚线。
let G = null, SEL = null, ZOOM = 1, NPOS = {}, EDGE_OF = {};
let GROUPS = [], GROUP_OF = {}, EXPANDED = new Set(), CEXP = new Set(), RENDER_EDGES = [];
let PARENT_OF = {}, CHILDREN_OF = {}, EV_OF = {}, EV_SHARE = {};
const POS_KEY = "pdag.graph.pos.v3", EXP_KEY = "pdag.graph.exp.v2", CEXP_KEY = "pdag.graph.cexp.v1";
const DIM = {goal:{w:300,h:46}, grp:{w:310,h:54}, claim:{w:360,h:42}, ev:{w:330,h:30}};
const STATUS_COLOR = {supported:"#4caf7d", fragile:"#e0b341",
  conflicted:"#e05d5d", undetermined:"#e05d5d", invalidated:"#5c657a"};
const EDGE_STYLE = {
  addresses:    {stroke:"#5b8dee", dash:"", w:1.6, op:.5},
  derived_from: {stroke:"#9d7bea", dash:"", w:1.5, op:.85},
  contradicts:  {stroke:"#e05d5d", dash:"6 4", w:1.8, op:.95},
  in_group:     {stroke:"#2c3446", dash:"", w:1.2, op:.9},
};

const kindOf = id => id.startsWith("grp_") ? "grp"
              : G.claims.some(c=>c.id===id) ? "claim"
              : G.goals.some(g=>g.root_id===id) ? "goal" : "ev";
function truncFit(s, px, fs){                    // CJK 按 2 单位宽截断
  s = s || ""; const unit = fs * 0.532; let w = 0, out = "";
  for(const ch of s){
    w += /[⺀-鿿豈-﫿＀-￯]/.test(ch) ? 2*unit : unit;
    if(w > px){ return out + "…"; }
    out += ch;
  }
  return out;
}

function buildGroups(){
  GROUPS = []; GROUP_OF = {}; PARENT_OF = {}; CHILDREN_OF = {}; EV_OF = {}; EV_SHARE = {};
  const byGrp = {};
  for(const c of G.claims){
    const sid = (c.sessions && c.sessions[0]) || "none";
    const gid = "grp_" + sid.replace(/[^a-zA-Z0-9_-]/g, "_");
    GROUP_OF[c.id] = gid;
    (byGrp[gid] ??= {id: gid, session: sid, claims: []}).claims.push(c);
  }
  // 组内派生树：child --derived_from--> parent（同组才嵌套，防环）
  const cids = new Set(G.claims.map(c=>c.id));
  for(const e of G.edges){
    if(e.edge_type !== "derived_from") continue;
    if(!cids.has(e.src) || !cids.has(e.dst)) continue;
    if(GROUP_OF[e.src] !== GROUP_OF[e.dst]) continue;
    if(PARENT_OF[e.src]) continue;
    let anc = e.dst, loop = false;               // 防环：dst 的祖先里不能有 src
    while(anc){ if(anc === e.src){ loop = true; break; } anc = PARENT_OF[anc]; }
    if(loop) continue;
    PARENT_OF[e.src] = e.dst;
    (CHILDREN_OF[e.dst] ??= []).push(e.src);
  }
  for(const e of G.edges){
    if(e.edge_type !== "supports") continue;
    (EV_OF[e.dst] ??= []).push(e.src);
    EV_SHARE[e.src] = (EV_SHARE[e.src] || 0) + 1;
  }
  let i = 0;
  for(const grp of Object.values(byGrp)){
    i += 1;
    const freq = {};
    for(const c of grp.claims) for(const n of (c.entities||[])) freq[n] = (freq[n]||0)+1;
    const tops = Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,2).map(x=>x[0]);
    grp.label = tops.length ? tops.join(" · ")
              : grp.session === "none" ? "其他" : `子课题 ${i}`;
    grp.stats = {sup:0, fra:0, con:0};
    for(const c of grp.claims){
      if(c.status === "supported") grp.stats.sup++;
      else if(c.status === "fragile") grp.stats.fra++;
      else grp.stats.con++;
    }
    grp.roots = grp.claims.filter(c => !PARENT_OF[c.id]);
    GROUPS.push(grp);
  }
  GROUPS.sort((a,b) => b.claims.length - a.claims.length);
}
// 折叠链上溯：组收起 → 组卡；派生子的祖先未展开 → 上溯到最近可见祖先
function visId(id){
  if(kindOf(id) !== "claim") return id;
  if(!EXPANDED.has(GROUP_OF[id])) return GROUP_OF[id];
  const chain = [];                              // 自底向上收集祖先
  let node = id;
  while(PARENT_OF[node]){ chain.unshift(PARENT_OF[node]); node = PARENT_OF[node]; }
  let visible = chain.length ? chain[0] : id;    // 根总是可见
  for(let k = 0; k < chain.length; k++){
    if(!CEXP.has(chain[k])) return chain[k];     // 首个未展开祖先挡住下面所有
    visible = (k + 1 < chain.length) ? chain[k+1] : id;
  }
  return visible;
}

async function graphview(){
  const [g, an] = await Promise.all([api("/graph"), api("/analysis")]);
  G = {...g, analysis: an}; SEL = null;
  buildGroups();
  EXPANDED = new Set(JSON.parse(localStorage.getItem(EXP_KEY) || "[]")
                     .filter(id => GROUPS.some(x => x.id === id)));
  CEXP = new Set(JSON.parse(localStorage.getItem(CEXP_KEY) || "[]")
                 .filter(id => G.claims.some(c => c.id === id)));
  M.innerHTML = `<h2>图谱 · Project DAG</h2>
    <div class="row">
      <button class="ghost" onclick="ZOOM=Math.max(.5,ZOOM-.15);drawGraph()">−</button>
      <button class="ghost" onclick="ZOOM=Math.min(2,ZOOM+.15);drawGraph()">＋</button>
      <button class="ghost" onclick="setAllGroups(true)">展开全部</button>
      <button class="ghost" onclick="setAllGroups(false)">收起全部</button>
      <button class="ghost" onclick="resetLayout()">重置布局</button>
      <span class="dim">goal ${g.goals.length} · 子课题 ${GROUPS.length} · claim ${g.claims.length} · 证据 ${g.evidence.length}
        —— 点组卡/claim 展开下一层，拖动整理</span>
    </div>
    <div id="ginfo"></div>
    <div id="gwrap" style="overflow:auto;border:1px solid var(--line);border-radius:10px;background:#0a0c11"></div>
    <div class="dim" style="margin-top:8px;font-size:12px">
      <span style="color:#4caf7d">●</span> supported&nbsp;
      <span style="color:#e0b341">●</span> fragile&nbsp;
      <span style="color:#e05d5d">●</span> conflicted&nbsp;|&nbsp;
      <span style="color:#9d7bea">━</span> derived_from&nbsp;
      <span style="color:#e05d5d">╌</span> contradicts&nbsp;|&nbsp;
      ⚡承重 · 琥珀虚线=脆弱/假鲁棒 · 👤人类证据 ·
      claim 上 ▤n=n 条证据、×n=多 session 确认 · 证据上 ×n=被 n 条结论引用</div>`;
  if(!g.claims.length){
    document.getElementById("gwrap").innerHTML =
      '<div class="dim" style="padding:30px">还没有存活的 claim —— 先去「编译控制台」跑一次编译。</div>';
    return;
  }
  initPositions();
  drawGraph();
}

function setAllGroups(open){
  EXPANDED = open ? new Set(GROUPS.map(x=>x.id)) : new Set();
  if(!open) CEXP = new Set();
  persistExp(); initPositions(); drawGraph();
}
function toggleGroup(gid){
  EXPANDED.has(gid) ? EXPANDED.delete(gid) : EXPANDED.add(gid);
  persistExp(); initPositions(); drawGraph();
}
function toggleClaim(id){
  CEXP.has(id) ? CEXP.delete(id) : CEXP.add(id);
  persistExp(); initPositions(); drawGraph();
}
function persistExp(){
  localStorage.setItem(EXP_KEY, JSON.stringify([...EXPANDED]));
  localStorage.setItem(CEXP_KEY, JSON.stringify([...CEXP]));
}

// 递归树布局：claim 展开时其证据与派生子结论缩进跟随
function layoutClaim(pos, c, x, y){
  pos[c.id] = {x, y: y + DIM.claim.h/2};
  y += DIM.claim.h + 8;
  if(CEXP.has(c.id)){
    for(const evid of (EV_OF[c.id] || [])){
      pos[`${evid}@${c.id}`] = {x: x + 34, y: y + DIM.ev.h/2};
      y += DIM.ev.h + 6;
    }
    for(const kid of (CHILDREN_OF[c.id] || [])){
      const kc = G.claims.find(v=>v.id===kid);
      if(kc) y = layoutClaim(pos, kc, x + 34, y);
    }
  }
  return y;
}
function defaultLayout(){
  const pos = {}, X = {goal: 40, grp: 400, claim: 770};
  let y = 50;
  const y0all = y;
  for(const grp of GROUPS){
    if(EXPANDED.has(grp.id)){
      const y0 = y;
      for(const c of grp.roots) y = layoutClaim(pos, c, X.claim, y);
      pos[grp.id] = {x: X.grp, y: Math.max((y0 + y - 8) / 2, y0 + DIM.grp.h/2)};
      y += 16;
    } else {
      pos[grp.id] = {x: X.grp, y: y + DIM.grp.h/2};
      y += DIM.grp.h + 14;
    }
  }
  const mid = Math.max((y0all + y - 60) / 2, 50);
  G.goals.forEach((goal, i) => { pos[goal.root_id] = {x: X.goal, y: mid + i * 70}; });
  return pos;
}
function initPositions(){
  const saved = JSON.parse(localStorage.getItem(POS_KEY) || "{}");
  const base = defaultLayout();
  NPOS = {};
  for(const id of Object.keys(base))
    NPOS[id] = saved[id] ? {...saved[id]} : base[id];
}
function resetLayout(){ localStorage.removeItem(POS_KEY); initPositions(); drawGraph(); }
function savePositions(){ localStorage.setItem(POS_KEY, JSON.stringify(NPOS)); }

function connectedSet(rootId){
  const seen = new Set([rootId]), q = [rootId];
  const add = id => { if(!seen.has(id)){ seen.add(id); q.push(id); } };
  while(q.length){
    const n = q.pop(), k = kindOf(n);
    if(k === "grp" && n === rootId)
      for(const c of GROUPS.find(x=>x.id===n).claims) add(c.id);
    for(const e of G.edges){
      const t = e.edge_type;
      if(k === "claim"){
        if(t === "supports"   && e.dst === n) seen.add(e.src);
        if(t === "addresses"  && e.src === n) seen.add(e.dst);
        if(t === "derived_from" && (e.src === n || e.dst === n)) add(e.src === n ? e.dst : e.src);
        if(t === "contradicts"  && (e.src === n || e.dst === n)) add(e.src === n ? e.dst : e.src);
      } else if(k === "ev" && n === rootId){
        if(t === "supports" && e.src === n) add(e.dst);
      } else if(k === "goal" && n === rootId){
        if(t === "addresses" && e.dst === n) add(e.src);
      }
    }
    if(k === "claim") seen.add(GROUP_OF[n]);
  }
  return seen;
}
function litSet(){
  if(!SEL) return null;
  const s = connectedSet(SEL);
  for(const grp of GROUPS)
    if(grp.claims.some(c => s.has(c.id))) s.add(grp.id);
  return s;
}

function visibleNodeIds(){
  const out = [...G.goals.map(g=>g.root_id), ...GROUPS.map(x=>x.id)];
  const walk = (c) => {
    out.push(c.id);
    if(!CEXP.has(c.id)) return;
    for(const evid of (EV_OF[c.id] || [])) out.push(`${evid}@${c.id}`);
    for(const kid of (CHILDREN_OF[c.id] || [])){
      const kc = G.claims.find(v=>v.id===kid);
      if(kc) walk(kc);
    }
  };
  for(const grp of GROUPS) if(EXPANDED.has(grp.id)) grp.roots.forEach(walk);
  return out;
}

function buildRenderEdges(){
  const out = [], seen = new Set();
  const push = (src, dst, type, w) => {
    const key = `${src}|${dst}|${type}`;
    if(src === dst || seen.has(key)) return;
    seen.add(key); out.push({src, dst, type, w});
  };
  for(const grp of GROUPS){
    const goals = new Set(grp.claims.map(c => c.goal_id).filter(Boolean));
    for(const gid of goals)
      push(grp.id, gid, "addresses", Math.min(1.2 + grp.claims.length * .25, 3.2));
    if(EXPANDED.has(grp.id))
      for(const c of grp.roots) push(c.id, grp.id, "in_group");
  }
  for(const e of G.edges){
    if(e.edge_type === "derived_from"){
      const s = visId(e.src), d = visId(e.dst);
      // 树内父子已用缩进+连接线表达，只画「跨组/未嵌套」的派生边
      if(PARENT_OF[e.src] === e.dst && s === e.src && d === e.dst) continue;
      push(s, d, "derived_from");
    } else if(e.edge_type === "contradicts"){
      push(visId(e.src), visId(e.dst), "contradicts");
    }
  }
  return out;
}

function treeConnectors(){
  // 直角连接线（视觉树干）：claim → 其证据/派生子结论
  let out = "";
  const elbow = (px, py, cx, cy) =>
    `<path d="M ${px} ${py} L ${px} ${cy} L ${cx} ${cy}" fill="none"
       stroke="#2c3446" stroke-width="1.3"/>`;
  for(const grp of GROUPS){
    if(!EXPANDED.has(grp.id)) continue;
    for(const c of grp.claims){
      if(!CEXP.has(c.id)) continue;
      const p = NPOS[c.id]; if(!p) continue;
      const trunkX = p.x + 16;
      for(const evid of (EV_OF[c.id] || [])){
        const q = NPOS[`${evid}@${c.id}`]; if(!q) continue;
        out += elbow(trunkX, p.y + DIM.claim.h/2, q.x, q.y);
      }
      for(const kid of (CHILDREN_OF[c.id] || [])){
        const q = NPOS[kid]; if(!q) continue;
        out += elbow(trunkX, p.y + DIM.claim.h/2, q.x, q.y);
      }
    }
  }
  return out;
}

function edgePath(src, dst){
  const a = NPOS[src], b = NPOS[dst];
  if(!a || !b) return "";
  const da = DIM[src.includes("@") ? "ev" : kindOf(src)], db = DIM[dst.includes("@") ? "ev" : kindOf(dst)];
  let sx, tx;
  if(a.x + da.w/2 <= b.x + db.w/2){ sx = a.x + da.w; tx = b.x; }
  else { sx = a.x; tx = b.x + db.w; }
  const sy = a.y, ty = b.y, mx = (sx + tx) / 2;
  return `M ${sx} ${sy} C ${mx} ${sy}, ${mx} ${ty}, ${tx} ${ty}`;
}

function nodeCard(id, lit){
  const isEvInst = id.includes("@");
  const rawId = isEvInst ? id.split("@")[0] : id;
  const k = isEvInst ? "ev" : kindOf(id);
  const p = NPOS[id], d = DIM[k];
  if(!p) return "";
  const an = G.analysis;
  const dimmed = lit && !lit.has(rawId);
  const sel = SEL === rawId;
  let body = "", full = "";
  if(k === "goal"){
    const g = G.goals.find(x=>x.root_id===id); full = g.title;
    body = `<rect width="${d.w}" height="${d.h}" rx="10" fill="#131a2b"
        stroke="${sel?'#8fb3ff':'#5b8dee'}" stroke-width="${sel?2.2:1.4}"/>
      <rect width="4" height="${d.h-12}" x="7" y="6" rx="2" fill="#5b8dee"/>
      <text x="20" y="${d.h/2-3}" fill="#8b93a5" font-size="9" letter-spacing="1.5">GOAL</text>
      <text x="20" y="${d.h/2+13}" fill="#e8ebf2" font-size="12.5" font-weight="600">${esc(truncFit(full, d.w-34, 12.5))}</text>`;
  } else if(k === "grp"){
    const grp = GROUPS.find(x=>x.id===id);
    const open = EXPANDED.has(id);
    full = `${grp.label}（session: ${grp.session}）`;
    const s = grp.stats;
    body = `<rect width="${d.w}" height="${d.h}" rx="11" fill="${open?'#151a26':'#101521'}"
        stroke="${sel?'#cdd6e8':'#3d4966'}" stroke-width="${sel?2:1.4}"/>
      <text x="14" y="${d.h/2-4}" fill="#aeb7c9" font-size="12.5" font-weight="600">${open?"▾":"▸"} ${esc(truncFit(grp.label, d.w-90, 12.5))}</text>
      <text x="${d.w-12}" y="${d.h/2-4}" text-anchor="end" fill="#8b93a5" font-size="11">${grp.claims.length} 条</text>
      <text x="30" y="${d.h/2+15}" font-size="10.5"
        ><tspan fill="#4caf7d">✓${s.sup}</tspan><tspan fill="#e0b341"> △${s.fra}</tspan><tspan fill="#e05d5d"> ⚠${s.con}</tspan></text>`;
  } else if(k === "claim"){
    const c = G.claims.find(x=>x.id===id); full = c.statement;
    const col = STATUS_COLOR[c.status] || "#5c657a";
    const lb = (an.load_bearing||[]).find(x => x.id === id);
    const shaky = (an.fragile||[]).some(x=>x.id===id) || (an.pseudo_robust||[]).some(x=>x.id===id);
    const multi = (c.sessions||[]).length > 1 ? `×${c.sessions.length}` : "";
    const nEv = (EV_OF[id]||[]).length, nKid = (CHILDREN_OF[id]||[]).length;
    const open = CEXP.has(id);
    const arrow = (nEv + nKid) ? (open ? "▾" : "▸") : "·";
    body = `${shaky?`<rect x="-4" y="-4" width="${d.w+8}" height="${d.h+8}" rx="13" fill="none" stroke="#e0b341" stroke-dasharray="4 4" stroke-opacity=".8"/>`:""}
      <rect width="${d.w}" height="${d.h}" rx="10" fill="#10141d"
        stroke="${sel?'#cdd6e8':col}" stroke-width="${sel?2.2:1.3}" stroke-opacity="${sel?1:.75}"/>
      <text x="11" y="${d.h/2+4.5}" fill="#8b93a5" font-size="11">${arrow}</text>
      <circle cx="30" cy="${d.h/2}" r="5" fill="${col}"/>
      <text x="44" y="${d.h/2+4}" fill="#d7dae2" font-size="12">${esc(truncFit(full, d.w-60-(lb?26:0)-(multi?22:0)-(nEv&&!open?26:0), 12))}</text>
      ${nEv&&!open?`<text x="${d.w-(lb?36:10)-(multi?22:0)}" y="${d.h/2+4}" text-anchor="end" fill="#5c657a" font-size="10.5">▤${nEv}</text>`:""}
      ${multi?`<text x="${d.w-(lb?36:10)}" y="${d.h/2+4}" text-anchor="end" fill="#5b8dee" font-size="10.5">${multi}</text>`:""}
      ${lb?`<text x="${d.w-10}" y="${d.h/2+4}" text-anchor="end" fill="#e0b341" font-size="11">⚡${lb.critical_count}</text>`:""}`;
  } else {
    const ev = G.evidence.find(x=>x.id===rawId); full = ev.content || rawId;
    const human = ev.evidence_type === "human_attested";
    const share = EV_SHARE[rawId] > 1 ? `×${EV_SHARE[rawId]}` : "";
    const evLb = (an.load_bearing||[]).find(x => x.id === rawId);   // 承重证据（单点支撑多条结论）
    body = `<rect width="${d.w}" height="${d.h}" rx="8" fill="#0d1017"
        stroke="${sel?'#cdd6e8':(evLb?'#8a6d1f':(human?'#8a6d1f':'#252d3d'))}" stroke-width="${sel?2:(evLb?1.6:1.1)}"/>
      <text x="10" y="${d.h/2+4}" fill="#7e8798" font-size="10.5">${human?"👤 ":""}${esc(truncFit(full, d.w-20-(human?16:0)-(share?24:0)-(evLb?28:0), 10.5))}</text>
      ${evLb?`<text x="${d.w-(share?32:8)}" y="${d.h/2+4}" text-anchor="end" fill="#e0b341" font-size="10">⚡${evLb.critical_count}</text>`:""}
      ${share?`<text x="${d.w-8}" y="${d.h/2+4}" text-anchor="end" fill="#5b8dee" font-size="10">${share}</text>`:""}`;
  }
  return `<g id="n_${id}" transform="translate(${p.x},${p.y - d.h/2})"
      style="cursor:grab" opacity="${dimmed?0.14:1}"
      onpointerdown="dragStart(event,'${id}')">
    <title>${esc(full)}</title>${body}</g>`;
}

function drawGraph(){
  RENDER_EDGES = buildRenderEdges();
  const visible = visibleNodeIds();
  let maxX = 0, maxY = 0;
  for(const id of visible){
    const p = NPOS[id]; if(!p) continue;
    const d = DIM[id.includes("@") ? "ev" : kindOf(id)];
    maxX = Math.max(maxX, p.x + d.w); maxY = Math.max(maxY, p.y + d.h);
  }
  const width = Math.max(maxX + 50, 900), height = Math.max(maxY + 30, 260);
  const lit = litSet();
  EDGE_OF = {};
  let edges = "";
  RENDER_EDGES.forEach((e, i) => {
    const s = EDGE_STYLE[e.type] || EDGE_STYLE.in_group;
    const faded = lit && !(lit.has(e.src) && lit.has(e.dst));
    (EDGE_OF[e.src] ??= []).push(i); (EDGE_OF[e.dst] ??= []).push(i);
    edges += `<path id="e_${i}" d="${edgePath(e.src, e.dst)}" fill="none" stroke="${s.stroke}"
      stroke-width="${e.w || s.w}" stroke-opacity="${faded?0.06:s.op}"
      ${s.dash?`stroke-dasharray="${s.dash}"`:""} stroke-linecap="round"/>`;
  });
  const nodes = visible.map(id => nodeCard(id, lit)).join("");
  document.getElementById("gwrap").innerHTML =
    `<svg id="gsvg" width="${width*ZOOM}" height="${height*ZOOM}" viewBox="0 0 ${width} ${height}"
       xmlns="http://www.w3.org/2000/svg" onpointerdown="bgClick(event)">
      <defs><pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
        <circle cx="1" cy="1" r="1" fill="#1a1f2b"/></pattern></defs>
      <rect width="${width}" height="${height}" fill="url(#dots)"/>
      <g id="glayer-t">${treeConnectors()}</g>
      <g id="glayer-e">${edges}</g><g id="glayer-n">${nodes}</g></svg>`;
  renderGInfo();
}

// --- 拖拽：移动 <4px 视为点击（组卡/claim=展开收起，证据=选中隔离） ---
let _drag = null;
function svgPt(evt){
  const svg = document.getElementById("gsvg");
  const pt = svg.createSVGPoint(); pt.x = evt.clientX; pt.y = evt.clientY;
  return pt.matrixTransform(svg.getScreenCTM().inverse());
}
function dragStart(evt, id){
  evt.stopPropagation();
  const p = svgPt(evt);
  _drag = {id, dx: p.x - NPOS[id].x, dy: p.y - NPOS[id].y, moved: false,
           sx: evt.clientX, sy: evt.clientY};
  window.addEventListener("pointermove", dragMove);
  window.addEventListener("pointerup", dragEnd, {once: true});
}
function dragMove(evt){
  if(!_drag) return;
  if(Math.abs(evt.clientX-_drag.sx) + Math.abs(evt.clientY-_drag.sy) < 4 && !_drag.moved) return;
  _drag.moved = true;
  const p = svgPt(evt), id = _drag.id;
  const d = DIM[id.includes("@") ? "ev" : kindOf(id)];
  NPOS[id] = {x: Math.max(0, p.x - _drag.dx), y: Math.max(d.h/2, p.y - _drag.dy)};
  const g = document.getElementById("n_"+id);
  if(g) g.setAttribute("transform", `translate(${NPOS[id].x},${NPOS[id].y - d.h/2})`);
  for(const i of EDGE_OF[id] || []){
    const el = document.getElementById("e_"+i);
    if(el) el.setAttribute("d", edgePath(RENDER_EDGES[i].src, RENDER_EDGES[i].dst));
  }
  const t = document.getElementById("glayer-t");   // 直角树连线实时跟随
  if(t) t.innerHTML = treeConnectors();
}
function dragEnd(){
  window.removeEventListener("pointermove", dragMove);
  if(!_drag) return;
  const {id, moved} = _drag; _drag = null;
  if(moved){ savePositions(); return; }
  const k = id.includes("@") ? "ev" : kindOf(id);
  if(k === "grp"){ toggleGroup(id); return; }
  if(k === "claim" && ((EV_OF[id]||[]).length || (CHILDREN_OF[id]||[]).length)){
    toggleClaim(id); return;
  }
  const rawId = id.includes("@") ? id.split("@")[0] : id;
  SEL = (SEL === rawId) ? null : rawId; drawGraph();
}
function bgClick(evt){
  if(evt.target.tagName === "svg" || (evt.target.tagName === "rect" && evt.target.parentNode.tagName === "svg")){
    if(SEL){ SEL = null; drawGraph(); }
  }
}

function renderGInfo(){
  const box = document.getElementById("ginfo");
  if(!SEL){ box.innerHTML = ""; return; }
  const c = G.claims.find(x=>x.id===SEL);
  const gl = G.goals.find(x=>x.root_id===SEL);
  const grp = GROUPS.find(x=>x.id===SEL);
  const ev = G.evidence.find(x=>x.id===SEL);
  if(c) box.innerHTML = `<div class="card"><span class="s-${c.status}">●</span> ${esc(c.statement)}
    <span class="badge">${esc(c.status)}</span><span class="badge">承重 ${c.load_bearing}</span>
    ${(c.sessions||[]).length>1?`<span class="badge">跨 ${c.sessions.length} 个 session 确认</span>`:""}
    <button class="ghost" style="margin-left:8px" onclick="claimDetail('${c.id}')">详情</button></div>`;
  else if(grp) box.innerHTML = `<div class="card"><b>${esc(grp.label)}</b>
    <span class="badge">${grp.claims.length} 条 claim</span>
    <span class="dim mono">session: ${esc(grp.session)}</span></div>`;
  else if(gl) box.innerHTML = `<div class="card"><b>${esc(gl.title)}</b>
    <span class="badge">${esc(gl.status)}</span> <span class="dim">${esc(gl.description||"")}</span></div>`;
  else if(ev) box.innerHTML = `<div class="card">${esc(ev.content||ev.id)}
    <span class="badge">${esc(ev.evidence_type)}</span>
    <span class="badge">${ev.trust_score!=null?"trust "+ev.trust_score:"quality "+(ev.quality_score??"?")}</span>
    ${EV_SHARE[ev.id]>1?`<span class="badge">被 ${EV_SHARE[ev.id]} 条结论引用</span>`:""}</div>`;
}

// ---------------- 编译控制台 ----------------
async function compile(){
  const [runs, review] = await Promise.all([api("/compile-runs"), api("/review")]);
  M.innerHTML = `<h2>编译控制台</h2>
    <div class="row"><button id="btn" onclick="runCompile()">手动编译</button>
    <button class="ghost" onclick="fullCheck()">全量校验</button>
    <span id="msg" class="dim"></span></div>
    <h2>复核队列（${review.length}）</h2><div id="rq">${review.map(reviewCard).join("")||'<div class="dim">空</div>'}</div>
    <h2>编译历史</h2>` + runs.map(r=>`<div class="card mono" style="cursor:pointer"
      onclick="runDiff('${r.id}')">${esc(r.started_at)} · ${esc(r.trigger)} · ${esc(r.status)}
      ${r.stats?` · +${r.stats.claims_added}/merge ${r.stats.claims_merged}/失效 ${r.stats.claims_invalidated}/复核 ${r.stats.review_enqueued}`:""}</div>`).join("");
}
function reviewCard(i){
  const p = i.payload;
  let desc = i.item_type;
  if(i.item_type==="entity_merge") desc = `实体合并：<b>${esc(p.name)}</b> ≟ <b>${esc(p.candidate_name)}</b> (conf ${p.confidence})`;
  if(i.item_type==="claim_merge") desc = `claim 合并：${esc(p.new_statement)} → <span class="mono">${esc(p.target)}</span> (conf ${p.confidence})`;
  if(i.item_type==="conflict") desc = `冲突：${esc(p.a_statement)} ⚔ ${esc(p.b_statement)}`;
  if(i.item_type==="orphan_claims") desc = `孤儿池：${(p.candidates||[]).length} 条结论无法归属 goal`;
  if(i.item_type==="human_evidence") desc = `人类证据待佐证：${esc(p.text)}`;
  const act = i.item_type==="conflict"
    ? `<button onclick="resolve('${i.id}','accepted',{winner:'${p.a}'})">A 胜</button>
       <button onclick="resolve('${i.id}','accepted',{winner:'${p.b}'})">B 胜</button>`
    : i.item_type==="orphan_claims"
    ? `<input id="og_${i.id}" placeholder="goal root_id" size="18">
       <button onclick="resolve('${i.id}','accepted',{goal_id:document.getElementById('og_${i.id}').value})">收编</button>`
    : `<button onclick="resolve('${i.id}','accepted')">接受</button>`;
  return `<div class="card"><span class="badge">${esc(i.item_type)}</span> ${desc}<br>
    <div class="row" style="margin-top:6px">${act}
    <button class="ghost" onclick="resolve('${i.id}','rejected')">拒绝</button>
    <button class="ghost" onclick="resolve('${i.id}','deferred')">推迟</button></div></div>`;
}
async function resolve(id, decision, extra){
  await api(`/review/${id}/resolve`,{method:"POST",
    body:JSON.stringify({decision, extra:extra||{}})});
  compile();
}
async function runCompile(jumpToReport){
  document.getElementById("msg").textContent = "编译中…（session 多或 LLM 慢时需要一会儿）";
  try{
    const r = await api("/compile",{method:"POST",body:"{}"});
    document.getElementById("msg").textContent =
      `完成：+${r.stats.claims_added} claim，merge ${r.stats.claims_merged}，进复核 ${r.stats.review_enqueued}`;
    if(jumpToReport){ setTimeout(()=>go("report"), 900); return; }
  }catch(e){ document.getElementById("msg").textContent = "失败："+e.message; }
  setTimeout(compile, 800);
}
async function fullCheck(){
  const r = await api("/full-check",{method:"POST",body:"{}"});
  alert(r.clean ? "全量校验：与增量一致 ✓" : "发现漂移：\n"+JSON.stringify(r.changed,null,2));
}
async function runDiff(id){
  const r = await api("/compile-runs/"+id);
  M.innerHTML = `<h2>编译 diff · <span class="mono">${esc(id)}</span></h2>
    <pre>${esc(JSON.stringify(r.diff,null,2))}</pre>
    <button class="ghost" onclick="go('compile')">← 返回</button>`;
}

// ---------------- 周报 ----------------
async function report(){
  const r = await api("/report");
  M.innerHTML = `<h2>周报 ${esc(r.week_start)} ~ ${esc(r.week_end)}</h2>
    <div class="row"><button onclick="navigator.clipboard.writeText(RP)">复制 Markdown</button>
    <span class="dim">登记 human action：</span>
    <input id="ha" size="40" placeholder="昨晚在服务器跑通了 pipeline v3">
    <button class="ghost" onclick="logHuman()">登记</button></div>
    <pre>${esc(r.markdown)}</pre>`;
  window.RP = r.markdown;
}
async function logHuman(){
  const t = document.getElementById("ha").value.trim();
  if(t){ await api("/human-actions",{method:"POST",body:JSON.stringify({text:t})}); report(); }
}

// ---------------- 时间机器 ----------------
async function timemachine(){
  M.innerHTML = `<h2>时间机器</h2>
    <div class="row"><input type="date" id="tm">
    <button onclick="snap()">回放</button></div><div id="snap"></div>`;
}
async function snap(){
  const d = document.getElementById("tm").value;
  if(!d) return;
  const s = await api("/snapshot?as_of="+d+"T23:59:59Z");
  document.getElementById("snap").innerHTML =
    `<div class="card">当日 goal ${s.goals.length} 个 · claim ${s.claims.length} 条 · 边 ${s.edges.length} 条</div>` +
    s.claims.map(c=>`<div class="card"><span class="s-${c.status}">●</span> ${esc(c.statement)}
      <span class="dim mono">${c.id}</span></div>`).join("");
}

const ROUTES = {home, goals, graph:graphview, compile, report, time:timemachine};
// deep link: ?view=... picks the pane; ?autocompile=1 kicks off a compile and
// jumps to the weekly report when it finishes (desktop "一键导出" flow).
if (AUTO_COMPILE) {
  cur = "compile"; renderNav();
  compile().then(()=>runCompile(true));
} else if (START_VIEW && ROUTES[START_VIEW]) {
  go(START_VIEW);
} else {
  renderNav(); home();
}
</script>
